<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartStudy AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --text-dark: #1d1d1f;
            --accent-blue: #0071e3;
            --broq-purple: #6f42c1;
            --bg-light: #f5f5f7;
        }

        body { 
            background-color: var(--bg-light); 
            color: var(--text-dark); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #af52de, #6f42c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 4px;
            color: #515154;
        }

        /* --- HIGHLIGHTED INPUT FIELDS --- */
        .form-control {
            background: #ffffff;
            border: 1px solid #d2d2d7; /* Visible border for definition */
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 1rem;
            color: var(--text-dark);
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02); /* Inner depth */
        }

        .form-control::placeholder {
            color: #a1a1a6;
        }

        .form-control:focus {
            background: #fff;
            border-color: var(--broq-purple);
            box-shadow: 0 0 0 4px rgba(111, 66, 193, 0.15);
            outline: none;
        }
        /* ------------------------------- */

        .btn-login {
            background: var(--broq-purple);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(111, 66, 193, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(111, 66, 193, 0.3);
            background: #5a32a3;
            color: white;
        }

        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .back-home:hover { opacity: 0.7; }
    </style>
</head>
<body>

    <a href="/" class="back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Home
    </a>

    <div class="auth-card">
        <div class="text-center">
            <h2 class="brand-logo">SmartStudy AI</h2>
            <p class="text-muted mb-4" style="font-weight: 500;">Welcome back, Student!</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} border-0 shadow-sm mb-4" style="border-radius: 12px; font-size: 0.9rem;">
                  {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-login w-100">Sign In</button>
        </form>

        <p class="text-center mt-4 mb-0" style="font-size: 0.95rem; font-weight: 500; color: #86868b;">
            New here? <a href="{{ url_for('signup') }}" style="color: var(--broq-purple); text-decoration: none; font-weight: 700;">Create an account</a>
        </p>
    </div>

</body>
</html>
